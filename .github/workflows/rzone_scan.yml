name: RZone Momentum Scanner

on:
  # Manual trigger with optional strategy override
  workflow_dispatch:
    inputs:
      strategies:
        description: 'Comma-separated strategies (leave empty to use default from secrets)'
        required: false
        type: string

  # Scheduled: 8:30 AM IST = 3:00 AM UTC daily (Monday–Friday)
  schedule:
    - cron: '0 3 * * 1-5'

permissions:
  contents: read   # public repo only needs read; exports go to private repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Build config.ini from secrets
        env:
          RZONE_UCC: ${{ secrets.RZONE_UCC }}
          RZONE_PASSWORD: ${{ secrets.RZONE_PASSWORD }}
          RZONE_TOTP_SECRET: ${{ secrets.RZONE_TOTP_SECRET }}
          RZONE_STRATEGIES: ${{ inputs.strategies || secrets.RZONE_STRATEGIES }}
          RZONE_DOWNLOAD_DIR: ./exports
          RZONE_TG_BOT_TOKEN: ${{ secrets.RZONE_TG_BOT_TOKEN }}
          RZONE_TG_CHAT_ID: ${{ secrets.RZONE_TG_CHAT_ID }}
        run: python ci/build_config.py

      - name: Run RZone Scanner (headless)
        run: python ci/rzone_scanner_ci.py

      - name: Push exported CSVs to private repo
        if: always()
        env:
          EXPORTS_REPO_TOKEN: ${{ secrets.EXPORTS_REPO_TOKEN }}
        run: |
          # Check if any exports were produced
          if [ ! -d "exports" ] || [ -z "$(ls -A exports/ 2>/dev/null)" ]; then
            echo "No export files found — skipping push to private repo."
            exit 0
          fi

          # Clone the private exports repo using token
          git clone https://x-access-token:${EXPORTS_REPO_TOKEN}@github.com/atulb-1/rzone-exports.git private_exports

          # Copy today's exports into the private repo (date subfolder already created by scanner)
          cp -r exports/* private_exports/

          # Commit and push
          cd private_exports
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No new files to commit to private repo."
          else
            git commit -m "📊 Scan exports $(date +'%d-%m-%Y') — run #${{ github.run_number }}"
            git push
            echo "Exports pushed to private repo successfully."
          fi

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Clean up secrets
        if: always()
        run: rm -f config.ini
