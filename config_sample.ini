[CREDENTIALS]
; Login URL for your broker account
; In CI this is set via the RZONE_LOGIN_URL GitHub secret — do not commit real URL here
URL = <your-login-url>

; Your DefineE UCC (User Client Code)
UCC = YOUR_UCC_HERE

; Your DefineE login password
PASSWORD = YOUR_PASSWORD_HERE

; Your TOTP secret key (Base32 string from your authenticator setup)
; This is NOT the 6-digit code — it's the secret used to generate codes
; You can find it in your authenticator app export or the original QR code setup
TOTP_SECRET = YOUR_TOTP_SECRET_HERE

[SETTINGS]
; Folder where downloaded CSV files will be saved
; A date subfolder (DD_MM_YYYY) is auto-created inside this folder each run
DOWNLOAD_DIR = C:\Trading\My Downloads

[STRATEGIES]
; Add one strategy name per line (exactly as it appears in the scanner dropdown)
; Indentation with spaces or tabs is fine
LIST =
    MIP 37 As is
    MIP-34
    MIP Mid150 Monthly

[TELEGRAM]
; Optional: Get BOT_TOKEN from @BotFather on Telegram
; Get CHAT_ID from @userinfobot or @getidsbot
; For group chats, CHAT_ID starts with -100 (e.g. -1001234567890)
; Leave both blank to disable Telegram notifications
BOT_TOKEN =
CHAT_ID =
